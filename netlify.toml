[build]
  # Tell Netlify that the frontend project is inside the "frontend" folder
  base = "frontend"
  publish = "frontend/build"
  command = "npm run build"

[build.environment]
  # Fixes the Create React App issue where ESLint warnings crash the build
  CI = "false"

[[redirects]]
  # This ensures React Router works properly when users refresh the page
  from = "/*"
  to = "/index.html"
  status = 200
